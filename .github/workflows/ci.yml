name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck on C code
        run: |
          cppcheck --enable=warning,style,performance \
            --suppress=missingIncludeSystem \
            --error-exitcode=1 \
            --inline-suppr \
            column_encrypt.c

  build-and-test:
    name: PostgreSQL ${{ matrix.pg_version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        pg_version: [14, 15, 16, 17, 18]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL ${{ matrix.pg_version }}
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] \
            https://apt.postgresql.org/pub/repos/apt \
            $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y \
            postgresql-${{ matrix.pg_version }} \
            postgresql-server-dev-${{ matrix.pg_version }} \
            postgresql-contrib-${{ matrix.pg_version }}

      - name: Set pg_config path
        run: echo "/usr/lib/postgresql/${{ matrix.pg_version }}/bin" >> $GITHUB_PATH

      - name: Build extension
        run: make

      - name: Install extension
        run: sudo make install PG_CONFIG=/usr/lib/postgresql/${{ matrix.pg_version }}/bin/pg_config

      - name: Run regression tests
        run: |
          export PGDATA=$(mktemp -d)
          export PGPORT=54321
          export PGHOST=/tmp
          initdb --no-locale -E UTF8 "$PGDATA"
          echo "shared_preload_libraries = 'column_encrypt'" >> "$PGDATA/postgresql.conf"
          echo "unix_socket_directories = '/tmp'" >> "$PGDATA/postgresql.conf"
          echo "port = $PGPORT" >> "$PGDATA/postgresql.conf"
          pg_ctl -D "$PGDATA" -l "$PGDATA/postgres.log" -w start || \
            (cat "$PGDATA/postgres.log" && exit 1)
          createdb test_column_encrypt
          psql -h /tmp -p $PGPORT -d test_column_encrypt \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          make installcheck PGDATABASE=test_column_encrypt || \
            (cat "$PGDATA/postgres.log" && cat regression.diffs && pg_ctl -D "$PGDATA" stop && exit 1)
          pg_ctl -D "$PGDATA" stop

      - name: Verify 2.0 to 3.0 upgrade path
        if: matrix.pg_version == 14 || matrix.pg_version == 18
        run: |
          export PGDATA=$(mktemp -d)
          export PGPORT=54322
          export PGHOST=/tmp
          initdb --no-locale -E UTF8 "$PGDATA"
          echo "shared_preload_libraries = 'column_encrypt'" >> "$PGDATA/postgresql.conf"
          echo "unix_socket_directories = '/tmp'" >> "$PGDATA/postgresql.conf"
          echo "port = $PGPORT" >> "$PGDATA/postgresql.conf"
          pg_ctl -D "$PGDATA" -l "$PGDATA/postgres.log" -w start || \
            (cat "$PGDATA/postgres.log" && exit 1)
          createdb test_column_encrypt_upgrade
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade \
            -c "CREATE EXTENSION column_encrypt VERSION '2.0';"
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade \
            -c "ALTER EXTENSION column_encrypt UPDATE TO '3.0';"
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade \
            -c "CREATE ROLE upgrade_admin LOGIN;"
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade \
            -c "CREATE ROLE upgrade_runtime LOGIN;"
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade \
            -c "CREATE ROLE upgrade_reader LOGIN;"
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade \
            -c "GRANT column_encrypt_admin TO upgrade_admin;"
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade \
            -c "GRANT column_encrypt_runtime TO upgrade_runtime;"
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade \
            -c "GRANT column_encrypt_reader TO upgrade_reader;"
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade -At \
            -c "SELECT extversion FROM pg_extension WHERE extname = 'column_encrypt';" | grep -Fx '3.0'
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade -At \
            -c "SELECT has_function_privilege('upgrade_admin', 'register_cipher_key(text,text,text)', 'EXECUTE');" | grep -Fx 't'
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade -At \
            -c "SELECT has_function_privilege('upgrade_runtime', 'load_key(text)', 'EXECUTE');" | grep -Fx 't'
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade -At \
            -c "SELECT has_function_privilege('upgrade_runtime', 'loaded_cipher_key_versions()', 'EXECUTE');" | grep -Fx 't'
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade -At \
            -c "SELECT has_function_privilege('upgrade_reader', 'cipher_key_versions()', 'EXECUTE');" | grep -Fx 't'
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade -At \
            -c "SELECT has_function_privilege('public', 'load_key(text)', 'EXECUTE');" | grep -Fx 'f'
          pg_ctl -D "$PGDATA" stop

      - name: Verify 3.1 to 3.3 upgrade path (deprecation release)
        if: matrix.pg_version == 14 || matrix.pg_version == 18
        run: |
          export PGDATA=$(mktemp -d)
          export PGPORT=54323
          export PGHOST=/tmp
          initdb --no-locale -E UTF8 "$PGDATA"
          echo "shared_preload_libraries = 'column_encrypt'" >> "$PGDATA/postgresql.conf"
          echo "unix_socket_directories = '/tmp'" >> "$PGDATA/postgresql.conf"
          echo "port = $PGPORT" >> "$PGDATA/postgresql.conf"
          pg_ctl -D "$PGDATA" -l "$PGDATA/postgres.log" -w start || \
            (cat "$PGDATA/postgres.log" && exit 1)
          createdb test_upgrade_33
          psql -h /tmp -p $PGPORT -d test_upgrade_33 \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          # Install v3.1
          psql -h /tmp -p $PGPORT -d test_upgrade_33 \
            -c "CREATE EXTENSION column_encrypt VERSION '3.1';"
          # Upgrade to v3.3 (deprecation release with encrypt schema)
          psql -h /tmp -p $PGPORT -d test_upgrade_33 \
            -c "ALTER EXTENSION column_encrypt UPDATE TO '3.3';"
          psql -h /tmp -p $PGPORT -d test_upgrade_33 -At \
            -c "SELECT extversion FROM pg_extension WHERE extname = 'column_encrypt';" | grep -Fx '3.3'
          # Verify encrypt schema exists
          psql -h /tmp -p $PGPORT -d test_upgrade_33 -At \
            -c "SELECT nspname FROM pg_namespace WHERE nspname = 'encrypt';" | grep -Fx 'encrypt'
          # Verify new API functions exist
          psql -h /tmp -p $PGPORT -d test_upgrade_33 -At \
            -c "SELECT proname FROM pg_proc p JOIN pg_namespace n ON p.pronamespace = n.oid WHERE n.nspname = 'encrypt' AND p.proname = 'register_key';" | grep -Fx 'register_key'
          psql -h /tmp -p $PGPORT -d test_upgrade_33 -At \
            -c "SELECT proname FROM pg_proc p JOIN pg_namespace n ON p.pronamespace = n.oid WHERE n.nspname = 'encrypt' AND p.proname = 'load_key';" | grep -Fx 'load_key'
          psql -h /tmp -p $PGPORT -d test_upgrade_33 -At \
            -c "SELECT proname FROM pg_proc p JOIN pg_namespace n ON p.pronamespace = n.oid WHERE n.nspname = 'encrypt' AND p.proname = 'rotate';" | grep -Fx 'rotate'
          # Verify column_encrypt_user role exists
          psql -h /tmp -p $PGPORT -d test_upgrade_33 -At \
            -c "SELECT rolname FROM pg_roles WHERE rolname = 'column_encrypt_user';" | grep -Fx 'column_encrypt_user'
          # Old API still works in v3.3
          psql -h /tmp -p $PGPORT -d test_upgrade_33 -At \
            -c "SELECT proname FROM pg_proc WHERE proname = 'register_cipher_key' LIMIT 1;" | grep -Fx 'register_cipher_key'
          pg_ctl -D "$PGDATA" stop

      - name: Verify 3.3 to 4.0 upgrade path (clean release)
        if: matrix.pg_version == 14 || matrix.pg_version == 18
        run: |
          export PGDATA=$(mktemp -d)
          export PGPORT=54324
          export PGHOST=/tmp
          initdb --no-locale -E UTF8 "$PGDATA"
          echo "shared_preload_libraries = 'column_encrypt'" >> "$PGDATA/postgresql.conf"
          echo "unix_socket_directories = '/tmp'" >> "$PGDATA/postgresql.conf"
          echo "port = $PGPORT" >> "$PGDATA/postgresql.conf"
          pg_ctl -D "$PGDATA" -l "$PGDATA/postgres.log" -w start || \
            (cat "$PGDATA/postgres.log" && exit 1)
          createdb test_upgrade_40
          psql -h /tmp -p $PGPORT -d test_upgrade_40 \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          # Install v3.3 first
          psql -h /tmp -p $PGPORT -d test_upgrade_40 \
            -c "CREATE EXTENSION column_encrypt VERSION '3.3';"
          # Upgrade to v4.0
          psql -h /tmp -p $PGPORT -d test_upgrade_40 \
            -c "ALTER EXTENSION column_encrypt UPDATE TO '4.0';"
          psql -h /tmp -p $PGPORT -d test_upgrade_40 -At \
            -c "SELECT extversion FROM pg_extension WHERE extname = 'column_encrypt';" | grep -Fx '4.0'
          # Verify deprecated functions are GONE
          psql -h /tmp -p $PGPORT -d test_upgrade_40 -At \
            -c "SELECT COUNT(*) FROM pg_proc WHERE proname = 'cipher_key_disable_log';" | grep -Fx '0'
          psql -h /tmp -p $PGPORT -d test_upgrade_40 -At \
            -c "SELECT COUNT(*) FROM pg_proc WHERE proname = 'register_cipher_key';" | grep -Fx '0'
          psql -h /tmp -p $PGPORT -d test_upgrade_40 -At \
            -c "SELECT COUNT(*) FROM pg_proc WHERE proname = 'cipher_metrics';" | grep -Fx '0'
          psql -h /tmp -p $PGPORT -d test_upgrade_40 -At \
            -c "SELECT COUNT(*) FROM pg_proc WHERE proname = 'cipher_coverage_audit';" | grep -Fx '0'
          # Verify encrypt schema API still works
          psql -h /tmp -p $PGPORT -d test_upgrade_40 -At \
            -c "SELECT proname FROM pg_proc p JOIN pg_namespace n ON p.pronamespace = n.oid WHERE n.nspname = 'encrypt' AND p.proname = 'register_key';" | grep -Fx 'register_key'
          psql -h /tmp -p $PGPORT -d test_upgrade_40 -At \
            -c "SELECT proname FROM pg_proc p JOIN pg_namespace n ON p.pronamespace = n.oid WHERE n.nspname = 'encrypt' AND p.proname = 'load_key';" | grep -Fx 'load_key'
          psql -h /tmp -p $PGPORT -d test_upgrade_40 -At \
            -c "SELECT proname FROM pg_proc p JOIN pg_namespace n ON p.pronamespace = n.oid WHERE n.nspname = 'encrypt' AND p.proname = 'status';" | grep -Fx 'status'
          pg_ctl -D "$PGDATA" stop

      - name: Test v4.0 fresh install
        if: matrix.pg_version == 18
        run: |
          export PGDATA=$(mktemp -d)
          export PGPORT=54325
          export PGHOST=/tmp
          initdb --no-locale -E UTF8 "$PGDATA"
          echo "shared_preload_libraries = 'column_encrypt'" >> "$PGDATA/postgresql.conf"
          echo "unix_socket_directories = '/tmp'" >> "$PGDATA/postgresql.conf"
          echo "port = $PGPORT" >> "$PGDATA/postgresql.conf"
          pg_ctl -D "$PGDATA" -l "$PGDATA/postgres.log" -w start || \
            (cat "$PGDATA/postgres.log" && exit 1)
          createdb test_v40_fresh
          psql -h /tmp -p $PGPORT -d test_v40_fresh \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          # Fresh install of v4.0
          psql -h /tmp -p $PGPORT -d test_v40_fresh \
            -c "CREATE EXTENSION column_encrypt VERSION '4.0';"
          psql -h /tmp -p $PGPORT -d test_v40_fresh -At \
            -c "SELECT extversion FROM pg_extension WHERE extname = 'column_encrypt';" | grep -Fx '4.0'
          # Verify clean API (no deprecated functions)
          psql -h /tmp -p $PGPORT -d test_v40_fresh -At \
            -c "SELECT COUNT(*) FROM pg_proc WHERE proname = 'cipher_key_disable_log';" | grep -Fx '0'
          # Test basic workflow
          psql -h /tmp -p $PGPORT -d test_v40_fresh \
            -c "CREATE ROLE test_user LOGIN; GRANT column_encrypt_user TO test_user;"
          psql -h /tmp -p $PGPORT -d test_v40_fresh -c "SET ROLE test_user; SELECT encrypt.register_key('my-32-byte-test-encryption-key!!', 'test-pass');" | grep -F '1'
          psql -h /tmp -p $PGPORT -d test_v40_fresh -c "SET ROLE test_user; SELECT encrypt.load_key('test-pass');" | grep -F 't'
          # Create encrypted data
          psql -h /tmp -p $PGPORT -d test_v40_fresh -c "CREATE TABLE secrets (id serial, data encrypted_text); INSERT INTO secrets(data) VALUES ('secret-value');"
          psql -h /tmp -p $PGPORT -d test_v40_fresh -c "SELECT data FROM secrets;" | grep -F 'secret-value'
          # Test status function
          psql -h /tmp -p $PGPORT -d test_v40_fresh -c "SELECT key_loaded FROM encrypt.status();" | grep -F 't'
          pg_ctl -D "$PGDATA" stop
