name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck on C code
        run: |
          cppcheck --enable=warning,style,performance \
            --suppress=missingIncludeSystem \
            --error-exitcode=1 \
            --inline-suppr \
            column_encrypt.c

  build-and-test:
    name: PostgreSQL ${{ matrix.pg_version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        pg_version: [14, 15, 16, 17, 18]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL ${{ matrix.pg_version }}
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] \
            https://apt.postgresql.org/pub/repos/apt \
            $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y \
            postgresql-${{ matrix.pg_version }} \
            postgresql-server-dev-${{ matrix.pg_version }} \
            postgresql-contrib-${{ matrix.pg_version }}

      - name: Set pg_config path
        run: echo "/usr/lib/postgresql/${{ matrix.pg_version }}/bin" >> $GITHUB_PATH

      - name: Build extension
        run: make

      - name: Install extension
        run: sudo make install PG_CONFIG=/usr/lib/postgresql/${{ matrix.pg_version }}/bin/pg_config

      - name: Run regression tests
        run: |
          export PGDATA=$(mktemp -d)
          export PGPORT=54321
          export PGHOST=/tmp
          initdb --no-locale -E UTF8 "$PGDATA"
          echo "shared_preload_libraries = 'column_encrypt'" >> "$PGDATA/postgresql.conf"
          echo "unix_socket_directories = '/tmp'" >> "$PGDATA/postgresql.conf"
          echo "port = $PGPORT" >> "$PGDATA/postgresql.conf"
          pg_ctl -D "$PGDATA" -l "$PGDATA/postgres.log" -w start || \
            (cat "$PGDATA/postgres.log" && exit 1)
          createdb test_column_encrypt
          psql -h /tmp -p $PGPORT -d test_column_encrypt \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          make installcheck PGDATABASE=test_column_encrypt || \
            (cat "$PGDATA/postgres.log" && cat regression.diffs && pg_ctl -D "$PGDATA" stop && exit 1)
          pg_ctl -D "$PGDATA" stop

      - name: Verify 2.0 to 3.0 upgrade path
        if: matrix.pg_version == 14 || matrix.pg_version == 18
        run: |
          export PGDATA=$(mktemp -d)
          export PGPORT=54322
          export PGHOST=/tmp
          initdb --no-locale -E UTF8 "$PGDATA"
          echo "shared_preload_libraries = 'column_encrypt'" >> "$PGDATA/postgresql.conf"
          echo "unix_socket_directories = '/tmp'" >> "$PGDATA/postgresql.conf"
          echo "port = $PGPORT" >> "$PGDATA/postgresql.conf"
          pg_ctl -D "$PGDATA" -l "$PGDATA/postgres.log" -w start || \
            (cat "$PGDATA/postgres.log" && exit 1)
          createdb test_column_encrypt_upgrade
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade \
            -c "CREATE EXTENSION column_encrypt VERSION '2.0';"
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade \
            -c "ALTER EXTENSION column_encrypt UPDATE TO '3.0';"
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade \
            -c "CREATE ROLE upgrade_admin LOGIN;"
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade \
            -c "CREATE ROLE upgrade_runtime LOGIN;"
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade \
            -c "CREATE ROLE upgrade_reader LOGIN;"
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade \
            -c "GRANT column_encrypt_admin TO upgrade_admin;"
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade \
            -c "GRANT column_encrypt_runtime TO upgrade_runtime;"
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade \
            -c "GRANT column_encrypt_reader TO upgrade_reader;"
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade -At \
            -c "SELECT extversion FROM pg_extension WHERE extname = 'column_encrypt';" | grep -Fx '3.0'
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade -At \
            -c "SELECT has_function_privilege('upgrade_admin', 'register_cipher_key(text,text,text)', 'EXECUTE');" | grep -Fx 't'
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade -At \
            -c "SELECT has_function_privilege('upgrade_runtime', 'load_key(text)', 'EXECUTE');" | grep -Fx 't'
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade -At \
            -c "SELECT has_function_privilege('upgrade_runtime', 'loaded_cipher_key_versions()', 'EXECUTE');" | grep -Fx 't'
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade -At \
            -c "SELECT has_function_privilege('upgrade_reader', 'cipher_key_versions()', 'EXECUTE');" | grep -Fx 't'
          psql -h /tmp -p $PGPORT -d test_column_encrypt_upgrade -At \
            -c "SELECT has_function_privilege('public', 'load_key(text)', 'EXECUTE');" | grep -Fx 'f'
          pg_ctl -D "$PGDATA" stop

      - name: Verify 3.0 to 3.1 upgrade path
        if: matrix.pg_version == 14 || matrix.pg_version == 18
        run: |
          export PGDATA=$(mktemp -d)
          export PGPORT=54323
          export PGHOST=/tmp
          initdb --no-locale -E UTF8 "$PGDATA"
          echo "shared_preload_libraries = 'column_encrypt'" >> "$PGDATA/postgresql.conf"
          echo "unix_socket_directories = '/tmp'" >> "$PGDATA/postgresql.conf"
          echo "port = $PGPORT" >> "$PGDATA/postgresql.conf"
          pg_ctl -D "$PGDATA" -l "$PGDATA/postgres.log" -w start || \
            (cat "$PGDATA/postgres.log" && exit 1)
          createdb test_upgrade_31
          psql -h /tmp -p $PGPORT -d test_upgrade_31 \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          psql -h /tmp -p $PGPORT -d test_upgrade_31 \
            -c "CREATE EXTENSION column_encrypt VERSION '3.0';"
          psql -h /tmp -p $PGPORT -d test_upgrade_31 \
            -c "ALTER EXTENSION column_encrypt UPDATE TO '3.1';"
          psql -h /tmp -p $PGPORT -d test_upgrade_31 -At \
            -c "SELECT extversion FROM pg_extension WHERE extname = 'column_encrypt';" | grep -Fx '3.1'
          # Verify new 3.1 functions exist
          psql -h /tmp -p $PGPORT -d test_upgrade_31 -At \
            -c "SELECT proname FROM pg_proc WHERE proname = 'cipher_encryption_stats';" | grep -Fx 'cipher_encryption_stats'
          psql -h /tmp -p $PGPORT -d test_upgrade_31 -At \
            -c "SELECT proname FROM pg_proc WHERE proname = 'cipher_coverage_audit';" | grep -Fx 'cipher_coverage_audit'
          psql -h /tmp -p $PGPORT -d test_upgrade_31 -At \
            -c "SELECT proname FROM pg_proc WHERE proname = 'cipher_start_rotation_job';" | grep -Fx 'cipher_start_rotation_job'
          # Verify rotation jobs table exists
          psql -h /tmp -p $PGPORT -d test_upgrade_31 -At \
            -c "SELECT relname FROM pg_class WHERE relname = 'cipher_rotation_jobs';" | grep -Fx 'cipher_rotation_jobs'
          pg_ctl -D "$PGDATA" stop

      - name: Test production operations features
        if: matrix.pg_version == 18
        run: |
          export PGDATA=$(mktemp -d)
          export PGPORT=54324
          export PGHOST=/tmp
          initdb --no-locale -E UTF8 "$PGDATA"
          echo "shared_preload_libraries = 'column_encrypt'" >> "$PGDATA/postgresql.conf"
          echo "unix_socket_directories = '/tmp'" >> "$PGDATA/postgresql.conf"
          echo "port = $PGPORT" >> "$PGDATA/postgresql.conf"
          pg_ctl -D "$PGDATA" -l "$PGDATA/postgres.log" -w start || \
            (cat "$PGDATA/postgres.log" && exit 1)
          createdb test_prod_ops
          psql -h /tmp -p $PGPORT -d test_prod_ops \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          psql -h /tmp -p $PGPORT -d test_prod_ops \
            -c "CREATE EXTENSION column_encrypt;"
          # Test is_key_loaded function
          psql -h /tmp -p $PGPORT -d test_prod_ops -At \
            -c "SELECT is_key_loaded();" | grep -Fx 'f'
          # Test cipher_metrics returns valid JSON
          psql -h /tmp -p $PGPORT -d test_prod_ops -At \
            -c "SELECT cipher_metrics()::jsonb IS NOT NULL;"
          # Test cipher_coverage_summary
          psql -h /tmp -p $PGPORT -d test_prod_ops -At \
            -c "SELECT COUNT(*) >= 0 FROM cipher_coverage_summary();"
          pg_ctl -D "$PGDATA" stop
