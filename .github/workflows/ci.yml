name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  build-and-test:
    name: PostgreSQL ${{ matrix.pg_version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        pg_version: [14, 15, 16, 17, 18]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL ${{ matrix.pg_version }}
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] \
            https://apt.postgresql.org/pub/repos/apt \
            $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y \
            postgresql-${{ matrix.pg_version }} \
            postgresql-server-dev-${{ matrix.pg_version }} \
            postgresql-contrib-${{ matrix.pg_version }}

      - name: Set pg_config path
        run: echo "/usr/lib/postgresql/${{ matrix.pg_version }}/bin" >> $GITHUB_PATH

      - name: Build extension
        run: make

      - name: Install extension
        run: sudo make install PG_CONFIG=/usr/lib/postgresql/${{ matrix.pg_version }}/bin/pg_config

      - name: Run regression tests
        run: |
          export PGDATA=$(mktemp -d)
          export PGPORT=54321
          export PGHOST=/tmp
          initdb --no-locale -E UTF8 "$PGDATA"
          echo "shared_preload_libraries = 'column_encrypt'" >> "$PGDATA/postgresql.conf"
          echo "unix_socket_directories = '/tmp'" >> "$PGDATA/postgresql.conf"
          echo "port = $PGPORT" >> "$PGDATA/postgresql.conf"
          pg_ctl -D "$PGDATA" -l "$PGDATA/postgres.log" -w start || \
            (cat "$PGDATA/postgres.log" && exit 1)
          createdb test_column_encrypt
          psql -h /tmp -p $PGPORT -d test_column_encrypt \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          make installcheck PGDATABASE=test_column_encrypt || \
            (cat "$PGDATA/postgres.log" && cat regression.diffs && pg_ctl -D "$PGDATA" stop && exit 1)
          pg_ctl -D "$PGDATA" stop
